# Deploy on Render: https://render.com — New → Blueprint → connect this repo
services:
  - type: web
    name: christ-mission-school
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PUBLIC_URL
        value: https://www.christmissionschool.com

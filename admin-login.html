<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Christ Mission School</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page--admin-login">
  <main class="login-page">
    <div class="login-card">
      <a href="index.html" class="brand brand--centered" aria-label="Christ Mission School Home">
        <span class="brand__logo brand__logo--lg" aria-hidden="true">
          <img src="assets/cms-logo.png" alt="" width="144" height="144" decoding="async" />
        </span>
      </a>

      <h1 class="login-title">Admin Sign In</h1>
      <p class="login-sub">Christ Mission School · Admissions Console</p>

      <form id="adminLoginForm" class="login-form" novalidate>
        <div class="adm-field">
          <label for="admin_user">Username</label>
          <input type="text" id="admin_user" name="admin_user" autocomplete="username" placeholder="Enter username" required />
        </div>
        <div class="adm-field">
          <label for="admin_pass">Password</label>
          <div class="login-password">
            <input type="password" id="admin_pass" name="admin_pass" autocomplete="current-password" placeholder="Enter password" required />
            <button type="button" id="togglePass" class="login-password__toggle" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </button>
          </div>
        </div>

        <p class="login-error" id="loginError" hidden>Invalid username or password.</p>

        <button type="submit" class="pay-btn pay-btn--primary login-submit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          SIGN IN
        </button>
      </form>

      <p class="login-back"><a href="index.html">&larr; Back to website</a></p>
    </div>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
